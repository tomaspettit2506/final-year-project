name: Deploy Backend (Railway)
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  verify-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Validate deployment webhook
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_WEBHOOK" ]; then
            echo "Missing RAILWAY_DEPLOY_WEBHOOK secret. Add your Railway deploy webhook URL in GitHub repo settings (Settings > Secrets and variables > Actions)."
            exit 1
          fi

      - name: Trigger Railway deployment
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
        run: |
          curl -sS -X POST "$RAILWAY_DEPLOY_WEBHOOK"

      - name: Backend deployment triggered successfully
        run: echo "✓ Backend deployment was triggered on Railway."
